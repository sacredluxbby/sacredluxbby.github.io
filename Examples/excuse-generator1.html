<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming Excuse Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a0530 0%, #050505 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f0e6ff;
        }

        .container {
            background: rgba(26, 10, 46, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #9d50ff;
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 0 40px rgba(157, 80, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5em;
            color: #9d50ff;
            text-shadow: 0 0 20px rgba(157, 80, 255, 0.5);
            margin-bottom: 30px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 2px;
        }

        .excuse-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 40px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-align: center;
        }

        .excuse-text {
            font-size: 1.8em;
            font-weight: 700;
            color: #ff50e0;
            text-shadow: 0 0 10px rgba(255, 80, 224, 0.3);
            line-height: 1.4;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .button-group {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        button, .lang-select {
            font-family: 'Poppins', sans-serif;
            font-size: 1em;
            font-weight: 700;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #generateBtn {
            background: linear-gradient(135deg, #9d50ff, #ff50e0);
            color: white;
            flex: 2;
            min-width: 250px;
            box-shadow: 0 10px 20px rgba(157, 80, 255, 0.3);
        }

        #generateBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 80, 224, 0.4);
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #f0e6ff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex: 1;
            min-width: 200px;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff50e0;
        }

        .lang-select {
            background: #1a0a2e;
            color: #9d50ff;
            border: 1px solid #9d50ff;
            padding: 15px 20px;
            outline: none;
        }

        .feedback {
            color: #9d50ff;
            font-weight: 700;
            margin-top: 20px;
            height: 24px;
        }

        .footer {
            margin-top: 40px;
            color: #b3a1cc;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .excuse-text { font-size: 1.3em; }
            .button-group { flex-direction: column; }
            #generateBtn, .copy-btn, .lang-select { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EXCUSE GENERATOR</h1>
        <div class="excuse-box">
            <div class="excuse-text" id="excuseText">Loading excuses...</div>
        </div>
        <div class="button-group">
            <select id="langSelect" class="lang-select">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="et">Eesti</option>
            </select>
            <button id="generateBtn">Generate Excuse</button>
            <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
        <div class="feedback" id="feedback"></div>
        <div class="footer">
            <p>Why your code isn't working?</p>
        </div>
    </div>

    <script>
        const excuses = {
            en: {
                starters: ["I can't deploy because", "The bug exists because", "My code doesn't work because", "The server crashed because", "I missed the deadline because"],
                middles: ["a rogue semicolon", "a sentient rubber duck", "quantum fluctuations", "the WiFi is powered by hamsters", "a mysterious cosmic ray"],
                endings: ["and now nothing makes sense.", "and I've accepted my fate.", "and I'm not sure who's to blame.", "and physics no longer applies."]
            },
            ru: {
                starters: ["Я не могу деплоить, потому что", "Баг существует, потому что", "Мой код не работает, потому что", "Сервер упал, потому что", "Я пропустил дедлайн, потому что"],
                middles: ["коварная точка с запятой", "сознательная резиновая утка", "квантовые флуктуации", "WiFi работает на хомячках", "таинственный космический луч"],
                endings: ["и теперь ничего не имеет смысла.", "и я принял свою судьбу.", "и я не уверен, кто виноват.", "и физика уже не применима."]
            },
            et: {
                starters: ["Ma ei saa tegelda, sest", "Viga on olemas, sest", "Minu kood ei tööta, sest", "Server kukkus, sest", "Ma jäin hiljaks, sest"],
                middles: ["hullumeelne semikoolon", "teadlik kummipart", "kvantumkõikumised", "WiFi töötab hamstrite jõul", "müsteerium kosmilise kiire"],
                endings: ["ja nüüd pole midagi mõtet.", "ja ma olen oma saatusega rahul.", "ja ma ei tea, kes süüdi on.", "ja füüsika ei kehti enam."]
            }
        };

        const excuseText = document.getElementById('excuseText');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const feedback = document.getElementById('feedback');
        const langSelect = document.getElementById('langSelect');

        let currentLang = 'en';

        function generate() {
            const set = excuses[currentLang];
            const text = `${set.starters[Math.floor(Math.random()*set.starters.length)]} ${set.middles[Math.floor(Math.random()*set.middles.length)]} ${set.endings[Math.floor(Math.random()*set.endings.length)]}`;
            excuseText.textContent = text;
            feedback.textContent = '';
        }

        langSelect.addEventListener('change', (e) => {
            currentLang = e.target.value;
            generate();
        });

        generateBtn.addEventListener('click', generate);
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(excuseText.textContent).then(() => {
                feedback.textContent = '✓ Copied!';
                setTimeout(() => feedback.textContent = '', 2000);
            });
        });

        generate();
    </script>
</body>
</html>
