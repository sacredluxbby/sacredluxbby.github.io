<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a0530 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #f0e6ff;
        }
        .box {
            background: rgba(26, 10, 46, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(157, 80, 255, 0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8rem;
            color: #9d50ff;
            font-weight: 700;
        }
        input[type=password] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type=password]:focus {
            border-color: #9d50ff;
        }
        .bar {
            height: 8px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .fill {
            height: 100%;
            width: 0%;
            background: #9d50ff;
            transition: width .4s cubic-bezier(0.4, 0, 0.2, 1), background .4s;
            box-shadow: 0 0 10px rgba(157, 80, 255, 0.5);
        }
        .criteria {
            font-size: .9rem;
            color: #b3a1cc;
            list-style: none;
            padding-left: 0;
        }
        .criteria li {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }
        .criteria li::before {
            content: '○';
            margin-right: 10px;
            color: rgba(255,255,255,0.2);
        }
        .criteria li.valid {
            color: #ff50e0;
        }
        .criteria li.valid::before {
            content: '●';
            color: #ff50e0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Password Strength</h1>
        <input type="password" id="pwd" placeholder="Enter password">
        <div class="bar"><div class="fill" id="strengthFill"></div></div>
        <ul class="criteria" id="criteriaList">
            <li id="len">At least 8 characters</li>
            <li id="upper">Upper and lower case</li>
            <li id="number">Contains number</li>
            <li id="symbol">Contains symbol</li>
        </ul>
    </div>
    <script>
        const pwd = document.getElementById('pwd');
        const fill = document.getElementById('strengthFill');
        const crits = {
            len: document.getElementById('len'),
            upper: document.getElementById('upper'),
            number: document.getElementById('number'),
            symbol: document.getElementById('symbol')
        };

        pwd.addEventListener('input', () => {
            const val = pwd.value;
            let score = 0;

            const tests = {
                len: val.length >= 8,
                upper: /[a-z]/.test(val) && /[A-Z]/.test(val),
                number: /[0-9]/.test(val),
                symbol: /[^A-Za-z0-9]/.test(val)
            };

            for (const key in tests) {
                if (tests[key]) {
                    score++;
                    crits[key].classList.add('valid');
                } else {
                    crits[key].classList.remove('valid');
                }
            }

            const percent = (score / 4) * 100;
            fill.style.width = percent + '%';
            
            if (percent <= 25) fill.style.background = '#ff4d4d';
            else if (percent <= 50) fill.style.background = '#ffa333';
            else if (percent <= 75) fill.style.background = '#9d50ff';
            else fill.style.background = '#ff50e0';
        });
    </script>
</body>
</html>
