<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Phrase Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a0530 0%, #050505 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #f0e6ff;
        }

        .container {
            background: rgba(26, 10, 46, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(157, 80, 255, 0.2);
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 30px;
        }

        h1 {
            color: #9d50ff;
            text-align: center;
            font-size: 3.5em;
            font-weight: 900;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            letter-spacing: 10px;
            line-height: 1;
            grid-column: 1;
            grid-row: 1 / 5;
            text-shadow: 0 0 20px rgba(157, 80, 255, 0.3);
        }

        .phrase-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            grid-column: 2;
            position: relative;
            overflow: hidden;
        }

        .phrase-text {
            font-size: 1.5em;
            color: #ff50e0;
            text-align: center;
            font-style: italic;
            font-weight: 700;
            line-height: 1.5;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .button-group {
            display: flex;
            gap: 15px;
            grid-column: 2;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 15px 25px;
            font-size: 1em;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 120px;
        }

        .generate-btn {
            background: linear-gradient(135deg, #9d50ff, #ff50e0);
            color: white;
            box-shadow: 0 10px 20px rgba(157, 80, 255, 0.3);
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 80, 224, 0.4);
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #f0e6ff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #9d50ff;
        }

        .copy-feedback {
            grid-column: 2;
            text-align: center;
            color: #9d50ff;
            font-weight: 700;
            height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .copy-feedback.show { opacity: 1; }

        .phrase-counter {
            grid-column: 2;
            text-align: center;
            color: #b3a1cc;
            font-size: 0.9em;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
                padding: 30px 20px;
            }
            h1 {
                writing-mode: horizontal-tb;
                transform: none;
                font-size: 2em;
                grid-column: 1;
                grid-row: 1;
                margin-bottom: 20px;
            }
            .phrase-display, .button-group, .phrase-counter, .copy-feedback {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Boss Phrases</h1>

        <div class="phrase-display">
            <p class="phrase-text">Loading wisdom...</p>
        </div>

        <div class="button-group">
            <button class="copy-btn" id="languageBtn">Русский</button>
            <button class="generate-btn" id="generateBtn">Generate</button>
            <button class="copy-btn" id="copyBtn">Copy</button>
        </div>

        <div class="copy-feedback" id="copyFeedback">✓ Copied!</div>
        <div class="phrase-counter" id="counter">Generated: 0 phrases</div>
    </div>

    <script>
        const phrases = {
            en: ["Let's circle back and touch base offline.", "We need to think outside the box.", "Let's synergize our core competencies.", "This is a game-changer.", "We need to boil the ocean."],
            ru: ["Давайте вернемся к этому офлайн.", "Нам нужно мыслить шире.", "Давайте синергизируем компетенции.", "Это переломный момент.", "Нам нужно вскипятить океан."],
            et: ["Lähme tagasi ja arutleme offline.", "Peame väljuma kastist välja.", "Ühendame oma põhioskused.", "See on muutuja.", "Peame ookeani üle keema."]
        };

        let currentLang = 'ru';
        let generatedCount = 0;
        let lastIndex = -1;

        const textEl = document.querySelector('.phrase-text');
        const counterEl = document.getElementById('counter');
        const langBtn = document.getElementById('languageBtn');
        const feedbackEl = document.getElementById('copyFeedback');

        function generate() {
            const list = phrases[currentLang];
            let newIndex;
            do { newIndex = Math.floor(Math.random() * list.length); } while (newIndex === lastIndex && list.length > 1);
            lastIndex = newIndex;
            textEl.textContent = `"${list[newIndex]}"`;
            generatedCount++;
            counterEl.textContent = `Generated: ${generatedCount} phrases`;
        }

        document.getElementById('generateBtn').addEventListener('click', generate);
        
        langBtn.addEventListener('click', () => {
            const order = ['ru', 'en', 'et'];
            currentLang = order[(order.indexOf(currentLang) + 1) % order.length];
            langBtn.textContent = currentLang === 'ru' ? 'Русский' : currentLang === 'en' ? 'English' : 'Eesti';
            generate();
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(textEl.textContent).then(() => {
                feedbackEl.classList.add('show');
                setTimeout(() => feedbackEl.classList.remove('show'), 2000);
            });
        });

        generate();
    </script>
</body>
</html>
