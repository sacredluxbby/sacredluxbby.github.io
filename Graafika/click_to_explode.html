<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click-to-Explode - Klõpsud ja Välgatused</title>
    <style>
        :root {
            --bg-color: #020617;
            --text-color: #f8fafc;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none; /* Klõpsud lähevad läbi teksti canvasele */
            user-select: none;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 200;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .hint {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #38bdf8;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Explosion</h1>
        <p>Klõpsa ükskõik kuhu ekraanil</p>
        <div class="hint">KLÕPSA NÜÜD</div>
    </div>

    <canvas id="explodeCanvas"></canvas>

    <script>
        const canvas = document.getElementById('explodeCanvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                
                // Juhuslik nurk ja kiirus plahvatuse jaoks
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 8 + 3;
                
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                
                this.size = Math.random() * 5 + 2;
                this.gravity = 0.12; // Tõmbab osakesi alla
                this.friction = 0.96; // Õhutakistus
                this.alpha = 1; // Läbipaistvus
                this.decay = Math.random() * 0.015 + 0.01; // Kui kiiresti hääbub
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion(x, y) {
            const particleCount = 50; // Mitu osakest tekib
            const hue = Math.random() * 360; // Iga plahvatus on juhuslikku värvi
            
            for (let i = 0; i < particleCount; i++) {
                // Lisame veidi variatsiooni värvile ühe plahvatuse sees
                const color = `hsla(${hue + (Math.random() * 40 - 20)}, 90%, 65%, 1)`;
                particles.push(new Particle(x, y, color));
            }
        }

        window.addEventListener('mousedown', (e) => {
            createExplosion(e.clientX, e.clientY);
        });

        // Puutetundlikkuse tugi mobiilidele
        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            createExplosion(touch.clientX, touch.clientY);
        });

        function animate() {
            // Teeme kerge musta kihi peale, et tekitada liikumise jälg
            ctx.fillStyle = 'rgba(2, 6, 23, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                // Eemaldame nähtamatuks muutunud osakesed
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
