<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            font-family: 'Poppins', sans-serif;
            color: #f0e6ff;
            overflow: hidden;
        }
        #gameCanvas {
            background: #0a0510;
            display: block;
            border: 2px solid #9d50ff;
            box-shadow: 0 0 50px rgba(157, 80, 255, 0.2);
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PLAYER_SIZE = 20;
        const PLAYER_SPEED = 250;
        const ENEMY_RADIUS = 10;
        const SHAKE_DURATION = 0.2;
        const SHAKE_MAGNITUDE = 8;
        const PARTICLE_COUNT = 30;
        const PARTICLE_LIFETIME = 0.6;

        const COLORS = {
            player: '#9d50ff',
            enemy: '#ff50e0',
            particle: '#ff50e0',
            button: 'rgba(26, 10, 46, 0.8)',
            buttonHover: '#9d50ff',
            accent: '#ff50e0'
        };

        const DIFFICULTIES = {
            easy: { name: 'EASY', enemySpeed: 80, spawnInterval: 4, minSpawnInterval: 1.5, difficultyScale: 0.08 },
            medium: { name: 'MEDIUM', enemySpeed: 120, spawnInterval: 3, minSpawnInterval: 1, difficultyScale: 0.15 },
            hard: { name: 'HARD', enemySpeed: 160, spawnInterval: 2, minSpawnInterval: 0.5, difficultyScale: 0.25 }
        };

        const state = {
            gameState: 'MENU',
            currentDifficultyKey: null,
            currentDifficulty: null,
            player: { x: CANVAS_WIDTH / 2, y: CANVAS_HEIGHT / 2 },
            enemies: [],
            particles: [],
            bgParticles: [],
            timeElapsed: 0,
            spawnTimer: 0,
            score: 0,
            highScore: localStorage.getItem('neon_survivor_highscore') || 0,
            shakeTimer: 0,
            keysPressed: {},
            mousePos: { x: 0, y: 0 },
            menuAlpha: 0
        };

        for(let i=0; i<50; i++) {
            state.bgParticles.push({
                x: Math.random() * CANVAS_WIDTH,
                y: Math.random() * CANVAS_HEIGHT,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 20 + 10
            });
        }

        const menuButtons = {
            easy: { x: 50, y: 220, width: 300, height: 60, difficulty: 'easy' },
            medium: { x: 50, y: 300, width: 300, height: 60, difficulty: 'medium' },
            hard: { x: 50, y: 380, width: 300, height: 60, difficulty: 'hard' }
        };

        function spawnEnemy() {
            const edge = Math.floor(Math.random() * 4);
            let x, y;
            if (edge === 0) { x = Math.random() * CANVAS_WIDTH; y = -ENEMY_RADIUS; }
            else if (edge === 1) { x = Math.random() * CANVAS_WIDTH; y = CANVAS_HEIGHT + ENEMY_RADIUS; }
            else if (edge === 2) { x = -ENEMY_RADIUS; y = Math.random() * CANVAS_HEIGHT; }
            else { x = CANVAS_WIDTH + ENEMY_RADIUS; y = Math.random() * CANVAS_HEIGHT; }
            return { x, y };
        }

        function spawnExplosion(x, y) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 100 + Math.random() * 200;
                state.particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, lifetime: 0, maxLifetime: PARTICLE_LIFETIME });
            }
            state.shakeTimer = SHAKE_DURATION;
        }

        function isPointInButton(x, y, button) {
            return x >= button.x && x <= button.x + button.width && y >= button.y && y <= button.y + button.height;
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function startGame(difficultyKey) {
            state.currentDifficultyKey = difficultyKey;
            state.currentDifficulty = DIFFICULTIES[difficultyKey];
            state.gameState = 'PLAY';
            state.player = { x: CANVAS_WIDTH / 2 - PLAYER_SIZE / 2, y: CANVAS_HEIGHT / 2 - PLAYER_SIZE / 2 };
            state.enemies = [];
            state.particles = [];
            state.timeElapsed = 0;
            state.score = 0;
            state.spawnTimer = 0;
            state.keysPressed = {};
        }

        function update(dt) {
            state.bgParticles.forEach(p => {
                p.y += p.speed * dt;
                if(p.y > CANVAS_HEIGHT) p.y = -10;
            });

            if (state.gameState === 'MENU') {
                state.menuAlpha = Math.min(1, state.menuAlpha + dt * 2);
                return;
            }

            state.shakeTimer = Math.max(0, state.shakeTimer - dt);
            state.particles.forEach((p, i) => {
                p.lifetime += dt; p.x += p.vx * dt; p.y += p.vy * dt;
                if (p.lifetime > p.maxLifetime) state.particles.splice(i, 1);
            });

            if (state.gameState === 'GAME_OVER') return;

            state.timeElapsed += dt;
            state.score += dt;

            const diff = state.currentDifficulty;
            const spawnInt = Math.max(diff.minSpawnInterval, diff.spawnInterval - state.timeElapsed * diff.difficultyScale);
            state.spawnTimer += dt;
            if (state.spawnTimer >= spawnInt) { state.enemies.push(spawnEnemy()); state.spawnTimer = 0; }

            let vx = 0, vy = 0;
            const keys = state.keysPressed;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) vy -= 1;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) vy += 1;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) vx -= 1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) vx += 1;

            if (vx !== 0 && vy !== 0) { vx *= Math.SQRT1_2; vy *= Math.SQRT1_2; }
            state.player.x = Math.max(0, Math.min(CANVAS_WIDTH - PLAYER_SIZE, state.player.x + vx * PLAYER_SPEED * dt));
            state.player.y = Math.max(0, Math.min(CANVAS_HEIGHT - PLAYER_SIZE, state.player.y + vy * PLAYER_SPEED * dt));

            state.enemies.forEach((en, i) => {
                const dx = state.player.x + PLAYER_SIZE / 2 - en.x, dy = state.player.y + PLAYER_SIZE / 2 - en.y;
                const d = Math.sqrt(dx * dx + dy * dy);
                en.x += (dx / d) * diff.enemySpeed * dt; en.y += (dy / d) * diff.enemySpeed * dt;

                const cX = Math.max(state.player.x, Math.min(en.x, state.player.x + PLAYER_SIZE));
                const cY = Math.max(state.player.y, Math.min(en.y, state.player.y + PLAYER_SIZE));
                if ((en.x - cX) ** 2 + (en.y - cY) ** 2 < ENEMY_RADIUS ** 2) {
                    state.gameState = 'GAME_OVER';
                    spawnExplosion(state.player.x + PLAYER_SIZE / 2, state.player.y + PLAYER_SIZE / 2);
                    if (state.score > state.highScore) { state.highScore = state.score; localStorage.setItem('neon_survivor_highscore', Math.floor(state.highScore)); }
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            ctx.fillStyle = 'rgba(157, 80, 255, 0.1)';
            state.bgParticles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });

            if (state.gameState === 'MENU') {
                ctx.globalAlpha = state.menuAlpha;
                
                ctx.strokeStyle = 'rgba(157, 80, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(400, 0); ctx.lineTo(400, CANVAS_HEIGHT);
                ctx.stroke();

                ctx.fillStyle = 'rgba(10, 5, 16, 0.7)';
                ctx.fillRect(0, 0, 400, CANVAS_HEIGHT);
                
                ctx.textAlign = 'left';
                ctx.fillStyle = COLORS.player;
                ctx.font = '900 48px Poppins';
                ctx.fillText('NEON', 50, 100);
                ctx.fillStyle = COLORS.accent;
                ctx.fillText('SURVIVOR', 50, 150);

                ctx.font = '400 16px Poppins';
                ctx.fillStyle = '#b3a1cc';
                ctx.fillText('SELECT YOUR CHALLENGE', 50, 190);

                Object.values(menuButtons).forEach(b => {
                    const h = isPointInButton(state.mousePos.x, state.mousePos.y, b);
                    if(h) {
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = COLORS.player;
                    }
                    ctx.fillStyle = h ? COLORS.buttonHover : COLORS.button;
                    ctx.beginPath();
                    ctx.roundRect(b.x, b.y, b.width, b.height, 12);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = h ? '#fff' : 'rgba(157, 80, 255, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.fillStyle = h ? '#000' : '#fff';
                    ctx.font = '700 20px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText(b.difficulty.toUpperCase(), b.x + b.width / 2, b.y + b.height / 2 + 8);
                });

                ctx.textAlign = 'left';
                ctx.fillStyle = COLORS.accent;
                ctx.font = '700 18px Poppins';
                ctx.fillText(`BEST SURVIVAL: ${Math.floor(state.highScore)}s`, 50, 560);
                
                ctx.globalAlpha = 1;
                return;
            }

            let sx = (Math.random() - 0.5) * state.shakeTimer * 50, sy = (Math.random() - 0.5) * state.shakeTimer * 50;
            ctx.save(); ctx.translate(sx, sy);
            ctx.shadowBlur = 15; ctx.shadowColor = COLORS.player; ctx.fillStyle = COLORS.player;
            ctx.fillRect(state.player.x, state.player.y, PLAYER_SIZE, PLAYER_SIZE);
            ctx.shadowBlur = 10; ctx.shadowColor = COLORS.enemy; ctx.fillStyle = COLORS.enemy;
            state.enemies.forEach(en => { ctx.beginPath(); ctx.arc(en.x, en.y, ENEMY_RADIUS, 0, Math.PI * 2); ctx.fill(); });
            state.particles.forEach(p => { ctx.globalAlpha = 1 - p.lifetime / p.maxLifetime; ctx.fillRect(p.x, p.y, 4, 4); });
            ctx.restore(); ctx.globalAlpha = 1;

            ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Poppins'; ctx.textAlign = 'left';
            ctx.fillText(`Score: ${Math.floor(state.score)}`, 20, 40);

            if (state.gameState === 'GAME_OVER') {
                ctx.fillStyle = 'rgba(5, 5, 5, 0.9)'; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.fillStyle = COLORS.player; ctx.font = '900 60px Poppins'; ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);
                ctx.fillStyle = '#fff'; ctx.font = '700 24px Poppins';
                ctx.fillText(`Final Score: ${Math.floor(state.score)}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 30);
                ctx.fillStyle = COLORS.accent;
                ctx.fillText(`Best: ${Math.floor(state.highScore)}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 70);
                ctx.fillStyle = '#fff'; ctx.font = '400 20px Poppins';
                ctx.fillText('Press R to Restart', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 130);
            }
        }

        function loop(t) { 
            const dt = Math.min(0.1, (t - (state.lt || t)) / 1000); 
            state.lt = t; update(dt); draw(); 
            requestAnimationFrame(loop); 
        }

        window.addEventListener('keydown', e => { 
            if (e.key.toLowerCase() === 'r') {
                if (state.gameState === 'GAME_OVER') startGame(state.currentDifficultyKey || 'medium');
            } else {
                state.keysPressed[e.key] = true;
            }
        });
        window.addEventListener('keyup', e => state.keysPressed[e.key] = false);

        canvas.addEventListener('mousemove', e => { 
            const r = canvas.getBoundingClientRect(); 
            state.mousePos = { x: e.clientX - r.left, y: e.clientY - r.top }; 
        });

        canvas.addEventListener('click', () => { 
            if (state.gameState === 'MENU') {
                Object.values(menuButtons).forEach(b => { 
                    if (isPointInButton(state.mousePos.x, state.mousePos.y, b)) startGame(b.difficulty); 
                });
            }
        });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
