<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Canvas Game</title>
    <style>
        /* dark background and center canvas */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }
        #gameCanvas {
            background: #222;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        // constants
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PLAYER_SIZE = 20;
        const PLAYER_SPEED = 200;  // always constant
        const ENEMY_RADIUS = 10;
        const SHAKE_DURATION = 0.2;  // screen shake duration in seconds
        const SHAKE_MAGNITUDE = 8;  // pixels
        const PARTICLE_COUNT = 30;
        const PARTICLE_LIFETIME = 0.6;  // seconds

        // difficulty presets
        const DIFFICULTIES = {
            easy: {
                name: 'EASY',
                enemySpeed: 80,
                spawnInterval: 4,
                minSpawnInterval: 1.5,
                difficultyScale: 0.08
            },
            medium: {
                name: 'MEDIUM',
                enemySpeed: 100,
                spawnInterval: 3,
                minSpawnInterval: 1,
                difficultyScale: 0.15
            },
            hard: {
                name: 'HARD',
                enemySpeed: 130,
                spawnInterval: 2,
                minSpawnInterval: 0.5,
                difficultyScale: 0.25
            }
        };

        // helper: spawn enemy at random edge
        function spawnEnemy() {
            const edge = Math.floor(Math.random() * 4);
            let x, y;
            if (edge === 0) { // top
                x = Math.random() * CANVAS_WIDTH;
                y = -ENEMY_RADIUS;
            } else if (edge === 1) { // bottom
                x = Math.random() * CANVAS_WIDTH;
                y = CANVAS_HEIGHT + ENEMY_RADIUS;
            } else if (edge === 2) { // left
                x = -ENEMY_RADIUS;
                y = Math.random() * CANVAS_HEIGHT;
            } else { // right
                x = CANVAS_WIDTH + ENEMY_RADIUS;
                y = Math.random() * CANVAS_HEIGHT;
            }
            return { x, y, color: 'red' };
        }

        // state
        const state = {
            gameState: 'MENU',  // MENU, PLAY, or GAME_OVER
            currentDifficulty: null,  // will be set on difficulty selection
            player: {
                x: CANVAS_WIDTH / 2 - PLAYER_SIZE / 2,
                y: CANVAS_HEIGHT / 2 - PLAYER_SIZE / 2,
                color: 'green'
            },
            enemies: [],
            particles: [],
            timeElapsed: 0,
            spawnTimer: 0,
            score: 0,
            highScore: 0,
            shakeTimer: 0,
            keysPressed: {}  // map for smooth movement
        };

        // high score persistence
        function loadHighScore() {
            const saved = localStorage.getItem('canvas_apocalypse_highscore');
            return saved ? parseInt(saved, 10) : 0;
        }

        function saveHighScore(score) {
            localStorage.setItem('canvas_apocalypse_highscore', Math.floor(score));
        }

        // particle system
        function spawnExplosion(x, y) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = (Math.random() * Math.PI * 2);
                const speed = 150 + Math.random() * 150;  // pixels per second
                const particle = {
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    lifetime: 0,
                    maxLifetime: PARTICLE_LIFETIME
                };
                state.particles.push(particle);
            }
            // trigger screen shake
            state.shakeTimer = SHAKE_DURATION;
        }

        function updateParticles(deltaTime) {
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.lifetime += deltaTime;
                p.x += p.vx * deltaTime;
                p.y += p.vy * deltaTime;

                // remove if lifetime exceeded
                if (p.lifetime > p.maxLifetime) {
                    state.particles.splice(i, 1);
                }
            }
        }

        function drawBackground() {
            // moving grid background
            ctx.strokeStyle = 'rgba(100, 100, 120, 0.15)';
            ctx.lineWidth = 1;
            const gridSize = 40;
            const offset = (state.timeElapsed * 20) % gridSize;  // slow drift

            // vertical lines
            for (let x = -offset; x < CANVAS_WIDTH; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, CANVAS_HEIGHT);
                ctx.stroke();
            }
            // horizontal lines
            for (let y = -offset; y < CANVAS_HEIGHT; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(CANVAS_WIDTH, y);
                ctx.stroke();
            }
        }

        function drawParticles() {
            for (let i = 0; i < state.particles.length; i++) {
                const p = state.particles[i];
                const alpha = 1 - (p.lifetime / p.maxLifetime);
                ctx.fillStyle = `rgba(255, 150, 50, ${alpha * 0.8})`;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            }
        }

        // setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // initialize high score on page load
        state.highScore = loadHighScore();

        // collision detection: circle vs rectangle
        function checkCollision(enemy) {
            // treat player as circle at center for simplicity
            const playerCenterX = state.player.x + PLAYER_SIZE / 2;
            const playerCenterY = state.player.y + PLAYER_SIZE / 2;
            const playerHalfSize = PLAYER_SIZE / 2;

            // find closest point on player rect to enemy circle center
            const closestX = Math.max(state.player.x, Math.min(enemy.x, state.player.x + PLAYER_SIZE));
            const closestY = Math.max(state.player.y, Math.min(enemy.y, state.player.y + PLAYER_SIZE));

            // distance between circle center and closest point on rect
            const dx = enemy.x - closestX;
            const dy = enemy.y - closestY;
            const distSquared = dx * dx + dy * dy;

            return distSquared < ENEMY_RADIUS * ENEMY_RADIUS;
        }

        function startGame(difficultyKey) {
            state.currentDifficulty = DIFFICULTIES[difficultyKey];
            state.gameState = 'PLAY';
            state.player.x = CANVAS_WIDTH / 2 - PLAYER_SIZE / 2;
            state.player.y = CANVAS_HEIGHT / 2 - PLAYER_SIZE / 2;
            state.enemies = [spawnEnemy()];
            state.timeElapsed = 0;
            state.spawnTimer = 0;
            state.score = 0;
            state.keysPressed = {};
        }

        function returnToMenu() {
            state.gameState = 'MENU';
            state.currentDifficulty = null;
            state.enemies = [];
            state.particles = [];
            state.timeElapsed = 0;
            state.spawnTimer = 0;
            state.score = 0;
            state.shakeTimer = 0;
            state.keysPressed = {};
        }

        function restart() {
            returnToMenu();
        }

        function update(deltaTime) {
            if (state.gameState === 'MENU') {
                // no gameplay in menu
                return;
            }

            // update shake timer
            state.shakeTimer = Math.max(0, state.shakeTimer - deltaTime);

            // increment timer and score
            state.timeElapsed += deltaTime;
            state.score += deltaTime;  // 1 point per second

            // update particles
            updateParticles(deltaTime);

            if (state.gameState === 'GAME_OVER') return;  // stop updating if game over

            const difficulty = state.currentDifficulty;

            // calculate current spawn interval with gradual difficulty increase
            const currentSpawnInterval = Math.max(
                difficulty.minSpawnInterval,
                difficulty.spawnInterval - (state.timeElapsed * difficulty.difficultyScale)
            );

            // spawn new enemy when interval elapses
            state.spawnTimer += deltaTime;
            if (state.spawnTimer >= currentSpawnInterval) {
                state.enemies.push(spawnEnemy());
                state.spawnTimer = 0;
            }

            // calculate velocity based on keys
            let vx = 0;
            let vy = 0;
            if (state.keysPressed['ArrowUp'] || state.keysPressed['w'] || state.keysPressed['W']) vy -= 1;
            if (state.keysPressed['ArrowDown'] || state.keysPressed['s'] || state.keysPressed['S']) vy += 1;
            if (state.keysPressed['ArrowLeft'] || state.keysPressed['a'] || state.keysPressed['A']) vx -= 1;
            if (state.keysPressed['ArrowRight'] || state.keysPressed['d'] || state.keysPressed['D']) vx += 1;

            // normalize diagonal movement
            if (vx !== 0 && vy !== 0) {
                const inv = 1 / Math.sqrt(2);
                vx *= inv;
                vy *= inv;
            }

            // apply speed and deltaTime (deltaTime in seconds)
            state.player.x += vx * PLAYER_SPEED * deltaTime;
            state.player.y += vy * PLAYER_SPEED * deltaTime;

            // clamp to bounds
            state.player.x = Math.max(0, Math.min(CANVAS_WIDTH - PLAYER_SIZE, state.player.x));
            state.player.y = Math.max(0, Math.min(CANVAS_HEIGHT - PLAYER_SIZE, state.player.y));

            // move all enemies toward player and check collisions
            for (let i = 0; i < state.enemies.length; i++) {
                const enemy = state.enemies[i];
                const dx = state.player.x + PLAYER_SIZE / 2 - enemy.x;
                const dy = state.player.y + PLAYER_SIZE / 2 - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    const nx = dx / dist;
                    const ny = dy / dist;
                    enemy.x += nx * difficulty.enemySpeed * deltaTime;
                    enemy.y += ny * difficulty.enemySpeed * deltaTime;
                }

                // check collision with this enemy
                if (checkCollision(enemy)) {
                    state.gameState = 'GAME_OVER';
                    // spawn explosion at collision point
                    spawnExplosion(state.player.x + PLAYER_SIZE / 2, state.player.y + PLAYER_SIZE / 2);
                    // update high score if current score is better
                    if (state.score > state.highScore) {
                        state.highScore = state.score;
                        saveHighScore(state.highScore);
                    }
                    break;
                }
            }
        }

        function draw() {
            // clear
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            if (state.gameState === 'MENU') {
                // draw menu screen
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('SURVIVOR GAME', CANVAS_WIDTH / 2, 80);

                ctx.font = '32px Arial';
                ctx.fillText('Select Difficulty', CANVAS_WIDTH / 2, 150);

                ctx.font = '24px Arial';
                ctx.fillText('Press 1 for EASY', CANVAS_WIDTH / 2, 220);
                ctx.fillText('Press 2 for MEDIUM', CANVAS_WIDTH / 2, 280);
                ctx.fillText('Press 3 for HARD', CANVAS_WIDTH / 2, 340);

                ctx.font = '16px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('(Easy: slower enemies, longer spawn intervals)', CANVAS_WIDTH / 2, 400);
                ctx.fillText('(Hard: faster enemies, shorter spawn intervals)', CANVAS_WIDTH / 2, 430);

                // display high score
                ctx.fillStyle = '#ffff00';
                ctx.font = '20px Arial';
                ctx.fillText(`High Score: ${Math.floor(state.highScore)}`, CANVAS_WIDTH / 2, 500);
                return;
            }

            // draw gameplay
            // draw background
            drawBackground();

            // calculate screen shake offset
            let shakeX = 0, shakeY = 0;
            if (state.shakeTimer > 0) {
                shakeX = (Math.random() - 0.5) * SHAKE_MAGNITUDE * 2;
                shakeY = (Math.random() - 0.5) * SHAKE_MAGNITUDE * 2;
            }

            // apply camera shake transform
            ctx.save();
            ctx.translate(shakeX, shakeY);

            // draw player
            ctx.fillStyle = state.player.color;
            ctx.fillRect(state.player.x, state.player.y, PLAYER_SIZE, PLAYER_SIZE);

            // draw all enemies (red circles)
            ctx.fillStyle = '#f00';
            for (let i = 0; i < state.enemies.length; i++) {
                const enemy = state.enemies[i];
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, ENEMY_RADIUS, 0, Math.PI * 2);
                ctx.fill();
            }

            // draw particles
            drawParticles();

            // restore camera transform
            ctx.restore();

            // draw UI overlay (time survived)
            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Time: ${state.timeElapsed.toFixed(1)}s`, 20, 30);
            ctx.fillText(`Score: ${Math.floor(state.score)}`, 20, 60);

            // draw game over screen
            if (state.gameState === 'GAME_OVER') {
                // semi-transparent overlay
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // "GAME OVER" text
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 30);

                // score and high score
                ctx.font = '24px Arial';
                ctx.fillText(`Final Score: ${Math.floor(state.score)}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 20);
                ctx.fillStyle = '#ffff00';
                ctx.fillText(`High Score: ${Math.floor(state.highScore)}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 60);

                // restart instruction
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.fillText('Press R to restart', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 110);
            }
        }

        let lastTimestamp = 0;
        function loop(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const delta = (timestamp - lastTimestamp) / 1000; // convert ms to seconds
            lastTimestamp = timestamp;

            update(delta);
            draw();
            requestAnimationFrame(loop);
        }

        // input listeners
        window.addEventListener('keydown', e => {
            // difficulty selection from menu
            if (state.gameState === 'MENU') {
                if (e.key === '1') startGame('easy');
                if (e.key === '2') startGame('medium');
                if (e.key === '3') startGame('hard');
                return;
            }

            // restart from game over
            if (e.key.toLowerCase() === 'r') {
                restart();
            } else {
                state.keysPressed[e.key] = true;
            }
        });
        window.addEventListener('keyup', e => {
            state.keysPressed[e.key] = false;
        });

        // start game
        requestAnimationFrame(loop);
    </script>
</body>
</html>
