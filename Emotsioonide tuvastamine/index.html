<!doctype html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotsioonipeegel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-emotion="neutral" class="pulse-on">
  <div class="ambient-shape ambient-shape-a"></div>
  <div class="ambient-shape ambient-shape-b"></div>
  <div id="fallLayer" class="fall-layer" aria-hidden="true"></div>

  <main class="app-shell">
    <section class="hero">
      <h1>Emotsioonipeegel</h1>
      <p>Rakendus loeb kaamerast näoilmet ning muudab tausta vastavalt emotsioonile: rõõm, kurbus, neutraalne või viha.</p>
      <div class="status-row">
        <button id="startBtn" class="btn">Käivita kaamera</button>
        <span id="status" class="status">Valmis alustama</span>
      </div>
    </section>

    <section class="stage-card">
      <div class="stage" id="stage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>
      <div class="emotion-output">
        <div>
          <span class="label">Tuvastatud emotsioon</span>
          <strong id="emotionName">Neutraalne</strong>
        </div>
        <div id="confidenceWrap" class="confidence-wrap">
          <span class="label">Tuju</span>
          <div class="meter"><span id="confidenceBar"></span></div>
          <div class="scale-labels"><small>Kurjast</small><small>Lahke</small></div>
          <small id="confidenceText">Neutraalne</small>
        </div>
      </div>
    </section>

    <section class="controls-card">
      <h2>Lisavalikud (5 tk)</h2>
      <div class="grid-controls">
        <label class="control-item">
          <input type="checkbox" id="optMirror" checked />
          <span>1) Peegelvaade kaameral</span>
        </label>
        <label class="control-item">
          <input type="checkbox" id="optConfidence" checked />
          <span>2) Tujuskaala (kuri -> lahke)</span>
        </label>
        <label class="control-item">
          <input type="checkbox" id="optHistory" checked />
          <span>3) Viimase 10 tuvastuse ajalugu</span>
        </label>
        <label class="control-item">
          <input type="checkbox" id="optSnapshot" checked />
          <span>4) Snapshot (nupp)</span>
        </label>
        <label class="control-item">
          <input type="checkbox" id="optGallery" checked />
          <span>5) Snapshot-galerii</span>
        </label>
      </div>

      <div id="historyWrap" class="history-wrap">
        <h3>Ajalugu</h3>
        <ul id="historyList"></ul>
      </div>

      <div id="snapshotTools" class="snapshot-tools">
        <button id="snapBtn" class="btn btn-alt">Tee snapshot</button>
      </div>
      <div id="snapshotWrap" class="snapshot-wrap">
        <h3>Snapshotid</h3>
        <div id="snapshots" class="snapshots"></div>
      </div>
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
